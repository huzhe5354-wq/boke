<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台登录 | Glass Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-dots"></div>
    <div class="glow" style="top: -100px; left: -100px;"></div>
    <div class="glow" style="bottom: -100px; right: -100px;"></div>

    <div class="glass-container w-full max-w-[420px] p-10 rounded-[40px] text-center" data-aos="zoom-in">
        <div class="mb-8">
            <div class="w-16 h-16 bg-indigo-500/10 border border-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-shield-halved text-2xl text-indigo-400"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">控制台登录</h1>
            <p class="text-slate-400 text-xs mt-2 font-medium uppercase tracking-widest">Glass Portfolio Admin</p>
        </div>

        <form onsubmit="event.preventDefault(); login();" class="space-y-5">
            <div class="relative group">
                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm group-focus-within:text-indigo-400 transition-colors"></i>
                <input id="username" type="text" placeholder="管理账号" required 
                    class="input-glass w-full py-3.5 pl-11 pr-4 rounded-2xl text-sm text-white placeholder:text-slate-600 outline-none">
            </div>

            <div class="relative group">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm group-focus-within:text-indigo-400 transition-colors"></i>
                <input id="password" type="password" placeholder="访问密码" required 
                    class="input-glass w-full py-3.5 pl-11 pr-4 rounded-2xl text-sm text-white placeholder:text-slate-600 outline-none">
            </div>

            <button type="submit" class="btn-gradient w-full py-4 rounded-2xl text-sm font-bold text-white mt-4">
                进入控制大屏
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/5">
            <a href="/index" class="text-[11px] text-slate-500 hover:text-indigo-400 transition-colors font-bold uppercase tracking-wider">
                <i class="fa-solid fa-arrow-left-long mr-2"></i> 返回个人主页
            </a>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
